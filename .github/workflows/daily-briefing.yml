name: Daily Podcast Briefing

on:
  schedule:
    - cron: '0 6 * * 1,4'  # Mon/Thu at 06:00 UTC (15:00 KST)
  workflow_dispatch:       # Manual trigger

concurrency:
  group: briefing
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # Python pipeline
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python pipeline/main.py

      # Copy data for Astro build
      - name: Copy summaries to web
        run: |
          mkdir -p web/public/data
          cp -r data/summaries/ web/public/data/

      # Astro build
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Astro site
        run: cd web && npm ci && npm run build

      # Commit data changes back to repo
      - name: Commit data
        run: |
          git config user.name "podcast-bot"
          git config user.email "bot@example.com"
          git add -A
          git diff --cached --quiet || git commit -m "briefing: $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || git push --force-with-lease

      # Deploy to GitHub Pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./web/dist

      - uses: actions/deploy-pages@v4
